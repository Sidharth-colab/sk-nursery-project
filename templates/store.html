<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>SKGreenary Store</title>
    <style>
        .plant-card { transition: transform 0.2s; border: none; border-radius: 15px; }
        .plant-card:hover { transform: scale(1.05); }
        .whatsapp-btn { background-color: #25D366; color: white; border-radius: 25px; }
        .whatsapp-btn:hover { background-color: #128C7E; color: white; }
        .hero-section { background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1466781783364-391eaf59cf40?auto=format&fit=crop&w=1350&q=80'); background-size: cover; background-position: center; }
    </style>
</head>
<body class="bg-light">

    <div class="bg-success text-white text-center py-5 mb-5 hero-section">
        <h1 class="display-4 fw-bold">🌿 SK Greenary</h1>
        <p class="lead">Fresh plants delivered from our garden to your home.</p>
    </div>

    <div class="container">
        <div class="row">
            {% for name, cat, price, stock in plants %}
            <div class="col-md-4 mb-4">
                <div class="card plant-card shadow-sm h-100">
                    <div class="card-body text-center">
                        <span class="badge bg-secondary mb-2">{{ cat }}</span>

                        <h4 class="card-title">{{ name }}</h4>

                        <p class="text-success fw-bold fs-4">₹{{ price }}</p>

                        <a href="https://wa.me/{{ phone }}?text=Hello%20SKGreenary!%20I%20want%20to%20buy%20the%20{{ name }}%20({{ cat }})%20for%20₹{{ price }}."
                           target="_blank"
                           class="btn btn-success w-100 shadow-sm"
                           style="background-color: #25D366; border: none; font-weight: bold;">
                            <i class="fab fa-whatsapp"></i> Buy Now
                        </a>

                        <small class="text-muted mt-2 d-block">{{ stock }} units available</small>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <footer class="text-center py-4 mt-5 text-muted">
        <hr class="container">
        <p>© 2026 Green Paradise Nursery | Visit us today!</p>
    </footer>

    <div style="position: fixed; bottom: 20px; right: 20px; z-index: 1000;">
        <a href="https://wa.me/{{ phone }}" target="_blank" class="btn btn-success rounded-circle p-3 shadow-lg">
            <i class="fab fa-whatsapp fa-2x"></i>
        </a>
    </div>

</body>
</html>
