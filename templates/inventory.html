<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Nursery Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>🌿 Manage Inventory</h1>
            <a href="/" class="btn btn-outline-success">Back to Dashboard</a>
        </div>

        <div class="card shadow-sm p-4 mb-5">
            <h3>Add New Species</h3>
            <form action="/add_plant" method="POST" class="row g-3">
                <div class="col-md-3"><input type="text" name="name" class="form-control" placeholder="Plant Name" required></div>
                <div class="col-md-3">
                    <select name="category" class="form-select">
                        <option value="Indoor">Indoor</option>
                        <option value="Outdoor">Outdoor</option>
                    </select>
                </div>
                <div class="col-md-2"><input type="number" name="price" class="form-control" placeholder="Selling Price" required></div>
                <div class="col-md-2"><input type="number" name="cost" class="form-control" placeholder="Cost Price" required></div>
                <div class="col-md-2"><button type="submit" class="btn btn-success w-100">Add Plant</button></div>
            </form>
        </div>

        <div class="card shadow-sm">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in plants %}
                    <tr>
                        <td>{{ p[0] }}</td>
                        <td><strong>{{ p[1] }}</strong></td>
                        <td>{{ p[2] }}</td>
                        <td>₹{{ p[3] }}</td>
                        <td>
                            <form action="/update_stock" method="POST" class="d-flex">
                                <input type="hidden" name="id" value="{{ p[0] }}">
                                <input type="number" name="qty" value="{{ p[4] }}" class="form-control form-control-sm me-2" style="width: 80px;">
                                <button type="submit" class="btn btn-sm btn-primary">Update</button>
                            </form>
                        </td>
                        <td>
                            <a href="/delete/{{ p[0] }}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this plant?')">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
