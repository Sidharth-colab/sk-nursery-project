<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>SKGreenary Login</title>
</head>
<body class="bg-success d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card shadow-lg p-4" style="width: 350px; border-radius: 20px;">
        <div class="text-center mb-4">
            <h2>🌿 SKGreenary</h2>
            <p class="text-muted">Admin Login</p>
        </div>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="mb-3">
                <input type="password" name="password" class="form-control form-control-lg text-center"
                       placeholder="Enter Password" required autofocus>
            </div>
            <button type="submit" class="btn btn-success w-100 btn-lg fw-bold">Login</button>
        </form>
    </div>
</body>
</html>
