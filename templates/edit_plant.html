<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Edit Plant</title>
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card shadow p-4">
            <h3 class="mb-4">✏️ Edit Plant</h3>
            <form action="/edit/{{ plant[0] }}" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Plant Name</label>
                    <input type="text" name="name" class="form-control" value="{{ plant[1] }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Category</label>
                    <select name="category" class="form-select">
                        <option value="Indoor" {{ 'selected' if plant[2]=='Indoor' }}>Indoor</option>
                        <option value="Outdoor" {{ 'selected' if plant[2]=='Outdoor' }}>Outdoor</option>
                        <option value="Vegetable" {{ 'selected' if plant[2]=='Vegetable' }}>Vegetable</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Selling Price (₹)</label>
                    <input type="number" name="price" class="form-control" value="{{ plant[3] }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Cost Price (₹)</label>
                    <input type="number" name="cost" class="form-control" value="{{ plant[6] }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Image URL</label>
                    <input type="text" name="image_url" class="form-control" value="{{ plant[7] }}">
                    {% if plant[7] %}
                    <img src="{{ plant[7] }}" class="mt-2 rounded" style="height: 100px; object-fit: cover;">
                    {% endif %}
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold">💾 Save Changes</button>
                <a href="/manage" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
